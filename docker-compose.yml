services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-admin_flow}
      POSTGRES_USER: ${POSTGRES_USER:-admin_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_flow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init/001_platform_schema.sql:/docker-entrypoint-initdb.d/001_platform_schema.sql:ro
      - ./infra/postgres/init/002_dynamic_schema.sql:/docker-entrypoint-initdb.d/002_dynamic_schema.sql:ro
      - ./infra/postgres/init/003_platform_seed.sql:/docker-entrypoint-initdb.d/003_platform_seed.sql:ro
      - ./modules/tenders/infra/postgres/010_tenders_schema.sql:/docker-entrypoint-initdb.d/010_tenders_schema.sql:ro
      - ./modules/tenders/infra/postgres/011_tenders_seed.sql:/docker-entrypoint-initdb.d/011_tenders_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      PORT: ${GATEWAY_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin_flow:admin_flow@postgres:5432/admin_flow}
      JWT_SECRET: ${JWT_SECRET:-replace-in-real-environments}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      tenders-api:
        condition: service_started

  tenders-api:
    build:
      context: .
      dockerfile: modules/tenders/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin_flow:admin_flow@postgres:5432/admin_flow}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:3000}
    ports:
      - "5173:5173"
    depends_on:
      - gateway

volumes:
  postgres-data:
