services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-admin_flow}
      POSTGRES_USER: ${POSTGRES_USER:-admin_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_flow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init/001_platform_schema.sql:/docker-entrypoint-initdb.d/001_platform_schema.sql:ro
      - ./infra/postgres/init/002_dynamic_schema.sql:/docker-entrypoint-initdb.d/002_dynamic_schema.sql:ro
      - ./infra/postgres/init/003_platform_seed.sql:/docker-entrypoint-initdb.d/003_platform_seed.sql:ro
      - ./modules/companies/infra/postgres/010_companies_schema.sql:/docker-entrypoint-initdb.d/010_companies_schema.sql:ro
      - ./modules/companies/infra/postgres/011_companies_seed.sql:/docker-entrypoint-initdb.d/011_companies_seed.sql:ro
      - ./modules/tenders/infra/postgres/010_tenders_schema.sql:/docker-entrypoint-initdb.d/020_tenders_schema.sql:ro
      - ./modules/tenders/infra/postgres/011_tenders_seed.sql:/docker-entrypoint-initdb.d/021_tenders_seed.sql:ro
      - ./modules/companies/infra/postgres/022_companies_cleanup.sql:/docker-entrypoint-initdb.d/022_companies_cleanup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      PORT: ${GATEWAY_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin_flow:admin_flow@postgres:5432/admin_flow}
      JWT_SECRET: ${JWT_SECRET:-replace-in-real-environments}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      companies-api:
        condition: service_started
      tenders-api:
        condition: service_started

  companies-api:
    build:
      context: .
      dockerfile: modules/companies/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin_flow:admin_flow@postgres:5432/admin_flow}
      REGISTER_ORSR_BASE_URL: ${REGISTER_ORSR_BASE_URL:-https://sluzby.orsr.sk}
      REGISTER_ORSR_TIMEOUT_SECONDS: ${REGISTER_ORSR_TIMEOUT_SECONDS:-15}
      REGISTER_ORSR_LEGACY_BASE_URL: ${REGISTER_ORSR_LEGACY_BASE_URL:-https://www.orsr.sk}
      REGISTER_ORSR_LEGACY_TIMEOUT_SECONDS: ${REGISTER_ORSR_LEGACY_TIMEOUT_SECONDS:-15}
      REGISTER_ORSR_LEGACY_PDF_TIMEOUT_SECONDS: ${REGISTER_ORSR_LEGACY_PDF_TIMEOUT_SECONDS:-30}
      REGISTER_ORCZ_BASE_URL: ${REGISTER_ORCZ_BASE_URL:-https://or.justice.cz/ias/ui}
      REGISTER_ORCZ_TIMEOUT_SECONDS: ${REGISTER_ORCZ_TIMEOUT_SECONDS:-15}
      REGISTER_FINANCE_BASE_URL: ${REGISTER_FINANCE_BASE_URL:-https://www.finreg.sk}
      REGISTER_FINANCE_TIMEOUT_SECONDS: ${REGISTER_FINANCE_TIMEOUT_SECONDS:-15}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

  tenders-api:
    build:
      context: .
      dockerfile: modules/tenders/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin_flow:admin_flow@postgres:5432/admin_flow}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:3000}
    ports:
      - "5173:5173"
    depends_on:
      - gateway

volumes:
  postgres-data:
