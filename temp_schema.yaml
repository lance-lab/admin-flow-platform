# modules/tenders

tenders (Obstaravanie)
    - id (UUID)
    - type (ENUM: "survey|prieskum", "competition|sutaz")
    - josephine_external_id (VARCHAR 20) (josephine_externe_id) 

measures (Opatrenia)
    - id (UUID)
    - tender_id (Reference to tenders)
    - number (TEXT) (Cislo Opatrenia)
    - sub_number (TEXT) (Cislo Podopatrenia)
    - call_number (TEXT) (Cislo Vyzvy) 
    - procurement_type (ENUM) (Druh zakazky)

procurement_contracts (Zakazky)
    - id (UUID)
    - tender_id (Reference to tenders)
    - name (TEXT) (NazovZakazky)
    - lot_division (TEXT) (RozdelenieZakazky)
    - project_name (TEXT) (NazovProjektu)
    - project_code (TEXT) (Kod Projektu)
    - cpv_code (TEXT) (Kod CPV)
    - contract_type (TEXT) (Typ Zmluvy)
    - delivery_address_street_number (TEXT) (Miesto Dodania Ulica Cislo)
    - delivery_address_postal_code (TEXT) (PSC)
    - delivery_address_city (TEXT) (Obec)
    - offer_submission_deadline (DATETIME) (Lehota Na Predkladanie Ponuk)
    - offer_opening_at (DATETIME) (Datum Otvarania A Vyhodnotenia Ponuk)
    - call_signed_at (DATETIME) (Datum Podpisu Vyzva)
    - record_signed_at (DATETIME) (Datum Podpisu Zaznam)
    - mandate_signed_at (DATETIME) (Datum Podpisu Splnomocnenie)
    - document_date (DATETIME) (Datum Aktualny)
    - delivery_deadline (DATETIME) (Termin Dodania)
    - offer_validity_deadline (DATETIME) (Lehota Viazanosti Ponuk)
    - estimated_value_excl_vat (DECIMAL 10, 2) (PHZ bez DPH)
    - estimated_value_incl_vat (DECIMAL 10, 2) (PHZ s DPH)

procurement_items (Predmet Zakazky)
    - id (UUID)
    - procurement_contract_id (Reference to procurement_contracts)
    - name (TEXT) (Nazov Polozky)
    - description (TEXT) (Popis Polozky)
    - quantity (DECIMAL 10, 2) (Mnozstvo)
    - unit (ENUM: "pcs|ks", "m|m", "kg|kg") (Jednotka)
    - estimated_value_excl_vat (DECIMAL 10, 2) (Odhadovana Hodnota bez DPH)
    - estimated_value_incl_vat (DECIMAL 10, 2) (Odhadovana Hodnota s DPH)

tender_companies
    - id (UUID)
    - tender_id (Reference to tenders)
    - company_id (Reference to companies)
    - role (ENUM: "contracting_authority", "bidder", "winner", "supplier")
    - contact_person_id (Reference to company_persons)
    - bank_account_id (Reference to company_bank_accounts)
    - is_primary (BOOLEAN)

# modules/companies

companies (Spolocnosti)
    - id (UUID)
    - name (TEXT) (Nazov Spolocnosti)
    - ico (TEXT) (ICO)
    - dic (TEXT) (DIC)
    - ic_dph (TEXT) (IC DPH)
    - address_street (TEXT) (Ulica)
    - address_number (TEXT) (Cislo)
    - address_city (TEXT) (Obec)
    - address_country (TEXT) (Stat, stored as English EU country name)
    - address_postal_code (TEXT) (PSC)
    - contracting_authority (BOOLEAN) (VerejnyZadavatel)

company_persons (SpolocnostiOsoby)
    - id (UUID)
    - company_id (Reference to companies)
    - name (TEXT) (Meno Priezvisko)
    - email (TEXT) (Email)
    - phone_number (TEXT) (Telefon)
    - date_of_birth (DATE) (DatumNarodenia)
    - role (TEXT) (Rola)
    - preferred (BOOLEAN) (Preferovany)

company_bank_accounts (SpolocnostiUcty)
    - id (UUID)
    - company_id (Reference to companies)
    - bank_account_number (TEXT) (CisloUctu)
    - bank_code (TEXT) (KodBanky)
    - preferred (BOOLEAN) (Preferovany)
